name: 更新贪吃蛇贡献图

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: FwindEmiko
          outputs: |
            profile/snake-light.svg
            profile/snake-dark.svg?palette=github-dark

      - name: 提交到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/snake-*.svg
          git commit -m "🐍 自动更新贪吃蛇贡献图 [skip ci]" || exit 0
          git push

<svg xmlns="http://www.w3.org/2000/svg" width="680" height="160" viewBox="0 0 680 160">
  <style>
    @keyframes fadeIn {
      0%, 10% { opacity: 0; transform: translateY(12px); }
      15%, 75% { opacity: 1; transform: translateY(0); }
      85%, 100% { opacity: 0; transform: translateY(-12px); }
    }
    .line1 { animation: fadeIn 14s ease-in-out infinite; }
    .line2 { animation: fadeIn 14s ease-in-out infinite 3.5s; }
    .line3 { animation: fadeIn 14s ease-in-out infinite 7s; }
    .line4 { animation: fadeIn 14s ease-in-out infinite 10.5s; }
    text { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>

  <text x="340" y="70" text-anchor="middle" font-size="28" font-weight="600" class="line1">
    <tspan fill="#2563EB">✨ 狐风轩汐 · F.windEmiko</tspan>
  </text>
  <text x="340" y="70" text-anchor="middle" font-size="28" font-weight="600" class="line2">
    <tspan fill="#2563EB">🌙 狐风拂码，汐落成诗</tspan>
  </text>
  <text x="340" y="70" text-anchor="middle" font-size="28" font-weight="600" class="line3">
    <tspan fill="#2563EB">🦊 狐思解缚，风起成序</tspan>
  </text>
  <text x="340" y="70" text-anchor="middle" font-size="28" font-weight="600" class="line4">
    <tspan fill="#2563EB">🌊 轩窗听汐，键落生花</tspan>
  </text>

  <text x="340" y="115" text-anchor="middle" font-size="15" fill="#6B7280">
    <animate attributeName="opacity" values="0;1;1;1;0" dur="14s" repeatCount="indefinite" />
    <tspan>MiragEdge 创始人 · Minecraft 互通服 · 全栈开发 · 网络运维</tspan>
  </text>
</svg>
